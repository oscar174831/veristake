[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./"}]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
